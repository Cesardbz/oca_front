<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - OCA Digital Solutions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0066FF;
            --dark-bg: #0a0b10;
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .btn-primary {
            background: linear-gradient(45deg, var(--primary-blue), #00d4ff);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-blue);
            color: white;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="fw-bold">OCA Admin</h2>
            <p class="text-muted">Panel de Control</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required placeholder="admin@ocadigital.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">INGRESAR</button>
        </form>
        <div id="loginMsg" class="mt-3 text-center small"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase-client.js"></script>
    <script>
        // Probar conexión al cargar
        async function testConnection() {
            const msg = document.getElementById('loginMsg');
            try {
                if (typeof supabaseClient === 'undefined') {
                    throw new Error('El cliente de Supabase no se cargó correctamente (supabaseClient is undefined)');
                }
                const { data, error } = await supabaseClient.from('usuarios').select('id').limit(1);
                console.log('Test de conexión:', { data, error });
                if (error && error.code !== 'PGRST116') { // PGRST116 es "no rows found", está bien
                   console.warn('Advertencia de conexión:', error.message);
                }
            } catch (err) {
                console.error('Error de conexión:', err);
                msg.style.color = '#ff9100';
                msg.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Advertencia: No se pudo conectar a Supabase. Revisa tu internet o la URL/Key.';
            }
        }
        testConnection();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('loginMsg');

            msg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando credenciales...';
            msg.style.color = 'white';

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) {
                    console.error('Error de Auth:', error);
                    msg.style.color = '#ff4d4d';
                    
                    if (error.message.includes('Email not confirmed')) {
                        msg.innerHTML = '<strong>Error: Email no confirmado.</strong><br>Desactiva "Confirm email" en Supabase > Authentication > Providers > Email.';
                    } else if (error.message.includes('Invalid login credentials')) {
                        msg.innerHTML = '<strong>Error: Correo o contraseña incorrectos.</strong><br>Verifica que el usuario exista en Supabase > Authentication > Users.';
                    } else {
                        msg.innerHTML = '<strong>Error:</strong> ' + error.message;
                    }
                } else {
                    msg.style.color = '#00ff88';
                    msg.innerHTML = '<i class="fas fa-check-circle"></i> ¡Acceso concedido! Entrando...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
            } catch (err) {
                console.error('Error fatal:', err);
                msg.style.color = '#ff4d4d';
                msg.innerHTML = '<strong>Error fatal:</strong> ' + err.message;
            }
        });
    </script>
</body>
</html>
